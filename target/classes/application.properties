spring.datasource.url=jdbc:h2:mem:eaglebank;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
#server.port=8080

# Logging
logging.level.com.eaglebank=DEBUG

springdoc.use-management-port=false
springdoc.show-actuator=false
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operations-sorter=alpha
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.config-url=/v3/api-docs/swagger-config
springdoc.swagger-ui.url=/openapi.yaml
springdoc.swagger-ui.use-root-path=true
server.forward-headers-strategy=framework

# Force the server URL to prevent inference of port 63342 (often from IDE proxies)
springdoc.api-docs.groups.enabled=true
springdoc.api-docs.resolve-schema-properties=true
springdoc.swagger-ui.display-request-duration=true
springdoc.override-with-generic-response=false
